<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7B2FFF;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#9B3DFF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4DC8FF;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="boltGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#C060FF;stop-opacity:1" />
      <stop offset="40%" style="stop-color:#9B3DFF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00C8FF;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="glowGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E080FF;stop-opacity:0.6" />
      <stop offset="100%" style="stop-color:#60DFFF;stop-opacity:0.6" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="innerGlow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Anel externo esquerdo (roxo escuro) - arco esquerdo -->
  <path d="M 256,60
             A 196,196 0 0,0 100,360"
        fill="none"
        stroke="url(#ringGrad)"
        stroke-width="44"
        stroke-linecap="round"
        filter="url(#glow)"
        opacity="0.95"/>

  <!-- Anel externo direito (azul cyan) - arco direito -->
  <path d="M 256,452
             A 196,196 0 0,0 412,152"
        fill="none"
        stroke="url(#ringGrad)"
        stroke-width="44"
        stroke-linecap="round"
        filter="url(#glow)"
        opacity="0.95"/>

  <!-- Brilho interno no anel esquerdo -->
  <path d="M 256,68
             A 188,188 0 0,0 108,354"
        fill="none"
        stroke="url(#glowGrad)"
        stroke-width="12"
        stroke-linecap="round"
        opacity="0.5"/>

  <!-- Brilho interno no anel direito -->
  <path d="M 256,444
             A 188,188 0 0,0 404,158"
        fill="none"
        stroke="url(#glowGrad)"
        stroke-width="12"
        stroke-linecap="round"
        opacity="0.5"/>

  <!-- Raio elétrico / Bolt principal -->
  <path d="M 322,58
             L 218,248
             L 275,248
             L 190,454
             L 358,222
             L 292,222
             Z"
        fill="url(#boltGrad)"
        filter="url(#glow)"
        opacity="0.97"/>

  <!-- Brilho/highlight no topo do raio -->
  <path d="M 322,58
             L 280,140
             L 295,140
             L 258,210
             L 292,222
             L 358,222
             Z"
        fill="url(#glowGrad)"
        opacity="0.45"/>

  <!-- Linha de brilho no centro do raio -->
  <path d="M 298,100
             L 272,180
             L 285,180
             L 240,290"
        fill="none"
        stroke="#E0B0FF"
        stroke-width="5"
        stroke-linecap="round"
        opacity="0.5"/>
</svg>
